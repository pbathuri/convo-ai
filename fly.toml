# Fly.io: `fly launch` (pick a unique app name), then `fly secrets set OPENAI_API_KEY=...`, then `fly deploy`
# https://fly.io/docs/languages-and-frameworks/docker/

app = "convo-ai"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
